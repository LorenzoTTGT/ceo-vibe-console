appId: com.guiido.vibe-console
productName: Vibe Console
copyright: Copyright © 2024 Guiido

publish:
  provider: github

directories:
  buildResources: build

mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  target:
    - dmg
    - zip
  # Skip code signing for local builds (set CSC_IDENTITY_AUTO_DISCOVERY=false)
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false

win:
  icon: build/icon.ico
  executableName: Vibe Console
  signtoolOptions:
    publisherName: Guiido
  target:
    - nsis
  # For unsigned builds, Windows will show SmartScreen warning
  # User clicks "More info" > "Run anyway"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  category: Development
  target:
    - AppImage
    - deb

files:
  - from: .next/standalone
    to: .
    filter:
      - "**/*"
      - "!dist{,/**}"
      - "!.git{,/**}"
      - "!src{,/**}"
      - "!docs{,/**}"
      - "!build{,/**}"
      - "!Dockerfile"
      - "!Dockerfile.sandbox"
      - "!docker-compose.yml"
      - "!README.md"
      - "!CLAUDE.md"
      - "!eslint.config.mjs"
      - "!next.config.ts"
      - "!postcss.config.mjs"
      - "!tsconfig.json"
      - "!package-lock.json"
      - "!get-codex-auth.bat"
  - from: .next/static
    to: .next/static
    filter:
      - "**/*"

asar: true
